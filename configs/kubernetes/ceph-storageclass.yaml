# Ceph configuration notes matching the testbed described in the paper
# (Section "Testbed Configuration"):
#
#   - Ceph 19.2.3, deployed on all 3 nodes
#   - 3x replication factor
#   - Persistent storage exposed to Kubernetes via the Ceph CSI driver
#   - NVMe-2 on each node dedicated to OSD storage (NVMe-1 reserved for
#     Proxmox VE system components)
#
# Example StorageClass using the Ceph CSI RBD driver:
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ceph-rbd-hci
provisioner: rbd.csi.ceph.com
parameters:
  clusterID: REPLACE_WITH_CEPH_CLUSTER_ID
  pool: hci-pool
  imageFeatures: layering
  csi.storage.k8s.io/fstype: ext4
reclaimPolicy: Delete
allowVolumeExpansion: true
---
# Example CephBlockPool (if using rook-ceph) with the 3x replication
# factor used in the testbed:
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: hci-pool
  namespace: rook-ceph
spec:
  replicated:
    size: 3
  failureDomain: host
