# Deploys the predictive/adaptive controller as a secondary scheduler
# alongside the default kube-scheduler, as used for Scenario 2 (Proposed
# Model) in the testbed described in the paper.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: predictive-scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: predictive-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-scheduler
subjects:
  - kind: ServiceAccount
    name: predictive-scheduler
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictive-scheduler
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: predictive-scheduler
  template:
    metadata:
      labels:
        app: predictive-scheduler
    spec:
      serviceAccountName: predictive-scheduler
      containers:
        - name: controller
          image: REPLACE_WITH_YOUR_IMAGE/predictive-scheduler:latest
          args:
            - --prometheus-url=http://prometheus.monitoring.svc:9090
            - --nodes=node-1
            - --nodes=node-2
            - --nodes=node-3
            - --interval=30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
