# Prometheus scrape configuration matching the testbed setup described in
# the paper: 30-second scrape interval, Kubernetes + Ceph + node-level
# metrics.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: kube-state-metrics
    static_configs:
      - targets: ["kube-state-metrics.monitoring.svc:8080"]

  - job_name: node-exporter
    static_configs:
      - targets:
          - "node-1:9100"
          - "node-2:9100"
          - "node-3:9100"

  - job_name: ceph-exporter
    static_configs:
      - targets: ["ceph-mgr.rook-ceph.svc:9283"]

  - job_name: kubelet-cadvisor
    scheme: https
    tls_config:
      insecure_skip_verify: true
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - target_label: __metrics_path__
        replacement: /metrics/cadvisor
